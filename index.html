            <h1 style="font-size:32px;margin:0 0 12px;">VidiVerify – Der 1-Klick-Check für deine Videos</h1>
            <p><strong>Videodateien prüfen, analysieren und archivieren – in Sekunden.</strong></p>
            <p>VidiVerify ist eine kostenlose Desktop-Anwendung für Windows zur professionellen Prüfung von Videodateien. Per Drag &amp; Drop werden Integrität, Container-Format, Codec, Bitrate, Framerate, Auflösung und Metadaten geprüft und im proprietären <strong>Media-Analyse-Protokoll (MAP)</strong> revisionssicher dokumentiert.</p>
            <h2 style="font-size:22px;margin:24px 0 8px;">Funktionen</h2>
            <ul>
               <li>Integritätsprüfung von Videodateien</li>
               <li>Formatprüfung für 30+ Container-Formate (MKV, MP4, AVI, MOV, WebM &hellip;)</li>
               <li>Media-Analyse: Codec, Bitrate, Framerate, Auflösung, HDR-Metadaten</li>
               <li>Proprietäres Media-Analyse-Protokoll (MAP)</li>
               <li>Lokale Verarbeitung ohne Cloud-Abhängigkeit</li>
            </ul>
            <h2 style="font-size:22px;margin:24px 0 8px;">Für wen ist VidiVerify?</h2>
            <p>Archivare, Sammler, Kuratoren und Postproduktions-Profis, die schnell und revisionssicher feststellen wollen, ob eine Videodatei intakt und für die Langzeitarchivierung geeignet ist.</p>
