<!doctype html>
<html lang="de">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <script>
         (function () {
            var path = location.pathname.replace(/\/$/, "");
            var routes = {
               "/releases": "/#download",
               "/download": "/#download",
               "/donate": "/#spenden",
               "/support": "/#kontakt",
               "/eula": "/#eula",
               "/datenschutz": "/#datenschutz",
               "/impressum": "/#impressum"
            };
            var target = routes[path];
            if (target) {
               location.replace(target);
            }
         })();
      </script>
      <title>404 | VidiVerify</title>
      <link rel="icon" type="image/svg+xml" href="/logo.svg" />
      <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
      <style>
         @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap");

         * { margin: 0; padding: 0; box-sizing: border-box; }

         body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #060610;
            color: #eeeef5;
            font-family: "Inter", system-ui, sans-serif;
            overflow: hidden;
         }

         .container { text-align: center; padding: 40px 24px; position: relative; z-index: 2; }

         .code {
            font-family: "JetBrains Mono", monospace;
            font-size: clamp(80px, 20vw, 160px);
            font-weight: 800;
            background: linear-gradient(135deg, #6aaccc, #4a7da0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 16px;
            animation: float 4s ease-in-out infinite;
         }

         .title { font-size: 22px; font-weight: 700; color: #eeeef5; margin-bottom: 12px; }

         .subtitle {
            font-size: 15px;
            color: #6e6e90;
            margin-bottom: 36px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
         }

         .mono { font-family: "JetBrains Mono", monospace; font-size: 13px; color: #6aaccc; margin-bottom: 32px; opacity: 0.8; }

         .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            color: #eeeef5;
            background: rgba(6, 40, 60, 0.8);
            border: 1px solid rgba(106, 172, 204, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
         }

         .btn:hover {
            background: rgba(106, 172, 204, 0.12);
            border-color: rgba(106, 172, 204, 0.5);
            box-shadow: 0 0 24px rgba(106, 172, 204, 0.15);
            transform: translateY(-2px);
         }

         .blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
         .blob-1 { width: 300px; height: 220px; background: #6aaccc; opacity: 0.06; top: 20%; left: 15%; animation: drift1 20s ease-in-out infinite; }
         .blob-2 { width: 260px; height: 300px; background: #4a7da0; opacity: 0.05; top: 60%; right: 15%; animation: drift2 18s ease-in-out infinite; }

         .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 480px;
            margin: 0 auto;
         }

         @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
         @keyframes drift1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(40px, -30px); } }
         @keyframes drift2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-30px, 20px); } }
      </style>
   </head>
   <body>
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>

      <div class="container">
         <div class="glass">
            <div class="code">404</div>
            <h1 class="title">Seite nicht gefunden</h1>
            <p class="mono">$ curl -I /this-page → HTTP 404</p>
            <p class="subtitle">
               Diese Seite existiert nicht oder wurde verschoben.
            </p>
            <a href="/" class="btn">
               <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m12 19-7-7 7-7" /><path d="M19 12H5" />
               </svg>
               Zur Startseite
            </a>
         </div>
      </div>

   </body>
</html>
