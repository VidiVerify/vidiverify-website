name: VidiVerify CI/CD

on:
   push:
      branches: [master]
   pull_request:
      branches: [master]

# Allow only one concurrent deployment
concurrency:
   group: "pages-${{ github.ref }}"
   cancel-in-progress: true

jobs:
   ci:
      runs-on: ubuntu-latest
      permissions:
         contents: read
         pages: write
         id-token: write
      timeout-minutes: 20
      steps:
         - name: Checkout code
           uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

         - name: Setup pnpm
           uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
           with:
              version: 10

         - name: Setup Node.js
           uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
           with:
              node-version: 24
              cache: "pnpm"

         - name: Install dependencies
           run: pnpm install --frozen-lockfile

         - name: Cache Puppeteer Chrome
           uses: actions/cache@v4
           with:
              path: ~/.cache/puppeteer
              key: puppeteer-chrome-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

         - name: Ensure Chrome for Puppeteer is installed
           run: pnpm exec puppeteer browsers install chrome

         - name: Lint code
           run: pnpm lint

         - name: Validate JSON data files
           run: |
              echo "Validating JSON data files..."
              find data -name "*.json" -exec echo "Checking {}" \; -exec node -e "JSON.parse(require('fs').readFileSync('{}', 'utf8'))" \;

         - name: Build with Vite
           run: pnpm build

         - name: Security audit
           run: |
              echo "Running security audit..."
              pnpm audit --audit-level=high || echo "Security vulnerabilities found, but continuing build"
           continue-on-error: true

         - name: Setup Pages
           uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

         - name: Upload artifact
           uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
           with:
              path: "build"

   deploy:
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      permissions:
         pages: write
         id-token: write
      environment:
         name: github-pages
         url: ${{ steps.deployment.outputs.page_url }}
      runs-on: ubuntu-latest
      needs: ci
      steps:
         - name: Deploy to GitHub Pages
           id: deployment
           uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
